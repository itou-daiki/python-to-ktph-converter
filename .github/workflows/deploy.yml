name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v7
      
    - name: Setup Pages
      uses: actions/configure-pages@v6
      
    - name: Prepare static site
      run: |
        mkdir _site
        cp index.html python-overview.html commontest-overview.html _site/
        cp -R assets Sample _site/
        
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v5
      with:
        path: '_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
